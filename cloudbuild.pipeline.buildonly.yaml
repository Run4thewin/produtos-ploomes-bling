# Build + push (sem deploy) da imagem do pipeline, usada tanto pelo Job
# bling-pipeline (fetcher horario) quanto pelo bling-drive-export (diario).
# Usado apenas para o primeiro build; deploys seguintes podem usar
# cloudbuild.pipeline.yaml (que ja assume o Job existente e faz update).

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.pipeline
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/bling-pipeline/bling-pipeline:$BUILD_ID
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/bling-pipeline/bling-pipeline:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/bling-pipeline/bling-pipeline

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/bling-pipeline/bling-pipeline:$BUILD_ID
  - us-central1-docker.pkg.dev/$PROJECT_ID/bling-pipeline/bling-pipeline:latest

options:
  logging: CLOUD_LOGGING_ONLY
